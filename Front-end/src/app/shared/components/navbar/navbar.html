<nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-xl border-b border-slate-400/10">
  <div class="flex items-center justify-between max-w-7xl mx-auto px-6 h-16">

    <!-- Logo -->
    <a class="flex items-center no-underline shrink-0" routerLink="/inicio" (click)="closeMenu()">
      <span class="text-2xl font-extrabold text-slate-100 tracking-tight">ERP<span class="text-blue-500">RRHH</span></span>
    </a>

    <!-- Links Desktop -->
    <ul class="hidden lg:flex items-center gap-8 list-none m-0 p-0">
      @for (link of navLinks; track link.path) {
        <li>
          <a class="text-slate-400 no-underline text-sm font-medium transition-colors duration-200 relative hover:text-slate-100 after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-blue-500 after:transition-all after:duration-200 hover:after:w-full" [routerLink]="link.path">{{ link.label }}</a>
        </li>
      }
    </ul>

    <!-- Botones Desktop -->
    <div class="hidden lg:flex items-center gap-3 shrink-0">
      <a class="inline-flex items-center justify-center px-5 py-2 text-sm font-semibold rounded-lg no-underline transition-all duration-200 cursor-pointer text-slate-200 border border-slate-400/30 bg-transparent hover:border-blue-500 hover:text-blue-500 hover:bg-blue-500/10" routerLink="/iniciar-sesion">Iniciar Sesión</a>
      <a class="inline-flex items-center justify-center px-5 py-2 text-sm font-semibold rounded-lg no-underline transition-all duration-200 cursor-pointer text-white bg-linear-to-br from-blue-500 to-blue-600 border border-transparent shadow-sm shadow-blue-500/30 hover:from-blue-600 hover:to-blue-700 hover:shadow-lg hover:shadow-blue-500/40 hover:-translate-y-0.5" routerLink="/prueba-gratuita">Prueba Gratuita</a>
    </div>

    <!-- Botón Hamburguesa Móvil -->
    <button (click)="toggleMenu()" class="lg:hidden flex items-center justify-center w-10 h-10 cursor-pointer bg-transparent border-0" aria-label="Menú">
      <div class="relative w-6 h-5">
        <span class="absolute left-0 w-6 h-0.5 bg-slate-100 transition-all duration-300 origin-center"
              [class]="menuOpen() ? 'top-2 rotate-45' : 'top-0'"></span>
        <span class="absolute left-0 top-2 w-6 h-0.5 bg-slate-100 transition-all duration-300"
              [class]="menuOpen() ? 'opacity-0' : 'opacity-100'"></span>
        <span class="absolute left-0 w-6 h-0.5 bg-slate-100 transition-all duration-300 origin-center"
              [class]="menuOpen() ? 'top-2 -rotate-45' : 'top-4'"></span>
      </div>
    </button>
  </div>

  <!-- Menú Fullscreen Móvil (Fondo Oscuro) -->
  <div class="lg:hidden fixed inset-0 top-16 bg-slate-900 transition-all duration-300 overflow-y-auto"
       [class]="menuOpen() ? 'opacity-100 visible' : 'opacity-0 invisible'">

    <!-- Área de Acciones -->
    <div class="flex items-center justify-center gap-4 px-6 py-6 border-b border-slate-700/50">
      <a class="text-sm font-semibold text-slate-300 no-underline transition-colors duration-200 hover:text-cyan-400" routerLink="/iniciar-sesion" (click)="closeMenu()">Iniciar sesión</a>
      <a class="inline-flex items-center justify-center px-5 py-2.5 text-sm font-bold rounded-lg no-underline transition-all duration-200 cursor-pointer text-white bg-cyan-500 hover:bg-cyan-400 hover:shadow-lg hover:shadow-cyan-500/30" routerLink="/prueba-gratuita" (click)="closeMenu()">Solicitar Demo</a>
    </div>

    <!-- Lista de Navegación -->
    <ul class="flex flex-col list-none m-0 p-0">
      @for (link of navLinks; track link.path; let last = $last) {
        <li [class]="!last ? 'border-b border-slate-700/50' : ''">
          <a class="block w-full text-center py-5 text-lg text-slate-200 no-underline font-medium transition-colors duration-200 hover:text-cyan-400 hover:bg-slate-800/50" [routerLink]="link.path" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      }
    </ul>

  </div>
</nav>
