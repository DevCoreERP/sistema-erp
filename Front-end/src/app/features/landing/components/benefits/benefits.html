<section class="py-20">
  <div class="max-w-7xl mx-auto px-6">
    <div class="bg-blue-50 rounded-4xl p-10 lg:p-14 grid grid-cols-1 lg:grid-cols-5 gap-10 items-center">

      <!-- Columna Izquierda: Título -->
      <div class="lg:col-span-2 flex items-center justify-center lg:justify-start">
        <h2 class="text-4xl lg:text-5xl font-bold text-gray-900 leading-tight">¿Por qué elegir nuestro ERP?</h2>
      </div>

      <!-- Columna Derecha: Acordeón -->
      <div class="lg:col-span-3">
        @for (item of items; track item.id) {
          <div class="border-b border-blue-200 last:border-b-0">
            <!-- Cabecera -->
            <button
              (click)="toggleItem(item.id)"
              class="w-full flex justify-between items-center py-5 cursor-pointer bg-transparent border-0 text-left">
              <span class="text-lg text-gray-900">
                <span class="font-bold">0{{ item.id }}.</span>
                <span class="font-medium ml-2">{{ item.title }}</span>
              </span>
              <span class="text-2xl text-gray-400 w-8 h-8 flex items-center justify-center shrink-0 transition-transform duration-300"
                    [class]="isOpen(item.id) ? 'rotate-45' : 'rotate-0'">
                +
              </span>
            </button>

            <!-- Cuerpo con animación grid -->
            <div class="grid transition-all duration-400 ease-in-out"
                 [class]="isOpen(item.id) ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'">
              <div class="overflow-hidden">
                <div class="pl-10 pb-5">
                  <p class="text-gray-700 leading-relaxed mb-4">{{ item.description }}</p>
                  <a routerLink="/inicio" class="inline-flex items-center gap-1 text-cyan-500 text-sm font-bold no-underline transition-colors duration-200 hover:text-cyan-600">
                    Obtenga más información
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                  </a>
                </div>
              </div>
            </div>
          </div>
        }
      </div>

    </div>
  </div>
</section>
