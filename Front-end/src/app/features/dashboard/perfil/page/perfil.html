<div class="flex min-h-screen">
  <app-sidebar></app-sidebar>

  <div class="flex-1">
    <app-topbar></app-topbar>

    <div class="p-6 bg-gray-100 min-h-screen">
      <div class="min-h-full">

        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-5 mb-6">
          <div>
            <h1 class="m-0 text-[30px] text-gray-900 font-bold">Información Personal</h1>
            <p class="mt-1.5 text-gray-500 text-sm">Información personal del usuario</p>
          </div>

          <div class="flex flex-wrap gap-3">
            <a routerLink="/panel" class="bg-gray-200 cursor-pointer text-gray-900 no-underline px-[18px] py-3 rounded-xl text-sm font-semibold transition-colors hover:bg-gray-300">
              ← Volver
            </a>
          </div>
        </div>

        <section class="bg-white rounded-[20px] p-6 border border-gray-200 shadow-[0_6px_18px_rgba(15,23,42,0.06)]">

          <div class="grid grid-cols-1 lg:grid-cols-[180px_1fr] gap-6 items-center mb-6">

            <div class="w-[180px] h-[180px] rounded-[18px] bg-slate-50 border-2 border-dashed border-slate-300 flex items-center justify-center overflow-hidden">
              <img
                *ngIf="usuario()?.id; else sinImagen"
                [src]="usuario()?.id ? '' : ''"
                alt="Foto del empleado"
                class="w-full h-full object-cover"
              />
              <ng-template #sinImagen>
                <span class="text-gray-500 text-sm">Sin imagen</span>
              </ng-template>
            </div>

            <div>
              <h2 class="m-0 text-[28px] text-gray-900 font-bold">{{ nombreCompleto }}</h2>
              <p class="mt-2 mb-3 text-gray-500 text-base">{{ usuario()?.roleName || '' }}</p>

              <span
                class="inline-block px-2.5 py-1.5 rounded-full text-xs font-semibold bg-green-100 text-green-700"
              >
                Activo
              </span>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

            <div class="bg-slate-50 rounded-2xl p-4">
              <label class="block text-[13px] text-gray-500 mb-2">Correo</label>
              <p class="m-0 text-[15px] text-gray-900 font-medium">{{ usuario()?.email || 'No registrado' }}</p>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4">
              <label class="block text-[13px] text-gray-500 mb-2">Dirección</label>
              <p class="m-0 text-[15px] text-gray-900 font-medium">{{ usuario()?.phoneNumber || 'No registrado' }}</p>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4">
              <label class="block text-[13px] text-gray-500 mb-2">Teléfono</label>
              <p class="m-0 text-[15px] text-gray-900 font-medium">{{ usuario()?.username || 'No registrado' }}</p>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4">
              <label class="block text-[13px] text-gray-500 mb-2">Departamento</label>
              <p class="m-0 text-[15px] text-gray-900 font-medium">No registrado</p>
            </div>

          </div>
          <button class="bg-blue-600 text-white px-[18px] my-5 py-3 rounded-xl text-sm font-semibold cursor-pointer transition-colors hover:bg-blue-700 border-none">
              Pedir cambio de Datos
            </button>
        </section>

      </div>
    </div>
  </div>
</div>
