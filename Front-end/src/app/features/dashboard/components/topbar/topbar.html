<header class="topbar">
  <div>
    <h1>Bienvenido, {{ nombreCompleto }} 👋</h1>
    <p>Panel principal del sistema de RRHH</p>
  </div>

  <div class="topbar-right">
    <span class="bell">🔔</span>

    <div class="user-menu-wrapper">
      <button class="user-trigger" type="button" (click)="toggleMenu()">
        <div class="user-avatar">
          {{ inicial }}
        </div>

        <div class="user-box">
          <strong>{{ nombreCompleto }}</strong>
          <small>Recursos Humanos</small>
        </div>

        <span class="arrow">▼</span>
      </button>

      <div class="user-dropdown" *ngIf="menuAbierto">
        <div class="dropdown-header">
          <div class="user-avatar large">
            {{ inicial }}
          </div>
          <div>
            <strong>{{ nombreCompleto }}</strong>
            <p>{{ email }}</p>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <a routerLink="/perfil" class="dropdown-item" (click)="cerrarMenu()">
          Mi perfil
        </a>
        <a routerLink="/configuracion" class="dropdown-item" (click)="cerrarMenu()">
          Configuración
        </a>
        <a class="dropdown-item logout" (click)="logout()">
          Cerrar sesión
        </a>
      </div>
    </div>
  </div>
</header>
